<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'"
    >
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>codex-deepseek-pet</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="pet-root" class="pet-root" data-pose="idle" data-gaze="center" data-runtime="browser">
      <div id="speech-bubble" class="speech-bubble" role="status" aria-live="polite">
        <span id="speech-text"></span>
      </div>

      <div class="sparkles" aria-hidden="true">
        <i></i><i></i><i></i><i></i><i></i>
      </div>

      <div id="pet-shell" class="pet-shell" role="button" aria-label="codex-deepseek-pet">
        <div class="ground-shadow" aria-hidden="true"></div>
        <div id="gaze-layer" class="gaze-layer">
          <div id="pose-frame" class="pose-frame">
            <img
              id="pet-image"
              class="pet-image"
              src="../../assets/pet/idle.png"
              alt="蓝色鲸鱼女仆桌面宠物"
              draggable="false"
            >
            <div id="eye-layer" class="eye-layer" aria-hidden="true">
              <span class="eye-socket eye-socket-left"><i class="iris-tracker"></i></span>
              <span class="eye-socket eye-socket-right"><i class="iris-tracker"></i></span>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
